version: '3.8'

services:
  # --------------------------------------------------------------------------
  # DATA LAYER
  # --------------------------------------------------------------------------
  db:
    image: ankane/pgvector:v0.5.1
    container_name: advisor_db
    environment:
      POSTGRES_DB: career_advisor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d career_advisor"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - advisor_net

  redis:
    image: redis:7-alpine
    container_name: advisor_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - advisor_net

  neo4j:
    image: neo4j:5-community
    container_name: advisor_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password123
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - advisor_net

  # --------------------------------------------------------------------------
  # MICROSERVICES
  # --------------------------------------------------------------------------
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.service
    container_name: advisor_gateway
    environment:
      - APP_MODULE=gateway.main:app
    ports:
      - "8000:8000"
    env_file: .env
    command: sh -c "uvicorn gateway.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - .:/app
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - advisor_net

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile.service
    container_name: advisor_auth
    environment:
      - APP_MODULE=services.auth_service.main:app
    env_file: .env
    command: sh -c "uvicorn services.auth_service.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - advisor_net

  jd-service:
    build:
      context: .
      dockerfile: Dockerfile.service
    container_name: advisor_jd
    environment:
      - APP_MODULE=services.jd_service.main:app
    env_file: .env
    command: sh -c "uvicorn services.jd_service.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - .:/app
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
    networks:
      - advisor_net

  cv-service:
    build:
      context: .
      dockerfile: Dockerfile.service
    container_name: advisor_cv
    environment:
      - APP_MODULE=services.cv_service.main:app
    env_file: .env
    command: sh -c "uvicorn services.cv_service.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - .:/app
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
    networks:
      - advisor_net

  analysis-service:
    build:
      context: .
      dockerfile: Dockerfile.service
    container_name: advisor_analysis
    environment:
      - APP_MODULE=services.analysis_service.main:app
    env_file: .env
    command: sh -c "uvicorn services.analysis_service.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - advisor_net

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: advisor_worker
    env_file: .env
    volumes:
      - .:/app
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - advisor_net

networks:
  advisor_net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  neo4jdata:
