
x-service-base: &service-base
  image: ${GHCR_BACKEND_SERVICE_IMAGE:-advisor-backend-service:latest}
  build:
    context: .
    dockerfile: Dockerfile.service
  env_file: .env
  environment:
    - POSTGRES_HOST=advisor_db_prod
    - REDIS_HOST=advisor_redis_prod
  restart: always
  networks:
    - advisor_net_prod
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
  deploy:
    resources:
      limits:
        cpus: '1.0'
        memory: 1G
      reservations:
        cpus: '0.25'
        memory: 256M

x-worker-base: &worker-base
  image: ${GHCR_BACKEND_WORKER_IMAGE:-advisor-backend-worker:latest}
  build:
    context: .
    dockerfile: Dockerfile.worker
  env_file: .env
  environment:
    - POSTGRES_HOST=advisor_db_prod
    - REDIS_HOST=advisor_redis_prod
  restart: always
  networks:
    - advisor_net_prod
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
  deploy:
    resources:
      limits:
        cpus: '2.0'
        memory: 2G
      reservations:
        cpus: '0.5'
        memory: 512M

services:
  db:
    image: ankane/pgvector:v0.5.1
    container_name: advisor_db_prod
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-career_advisor}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-career_advisor}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - advisor_net_prod
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  redis:
    image: redis:7-alpine
    container_name: advisor_redis_prod
    restart: always
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: >
      sh -c "
      if [ -n \"$$REDIS_PASSWORD\" ]; then
        redis-server --requirepass \"$$REDIS_PASSWORD\"
      else
        redis-server
      fi
      "
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-cli -a \"$$REDIS_PASSWORD\" ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - advisor_net_prod
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  gateway:
    <<: *service-base
    container_name: advisor_gateway_prod
    ports:
      - "8000:8000"
    command: uvicorn gateway.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  auth-service:
    <<: *service-base
    container_name: advisor_auth_prod
    command: uvicorn services.auth_service.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/auth/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  cv-service:
    <<: *service-base
    container_name: advisor_cv_prod
    command: uvicorn services.cv_service.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./data/cv_uploads:/app/data/cv_uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/cv/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  jd-service:
    <<: *service-base
    container_name: advisor_jd_prod
    command: uvicorn services.jd_service.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/jd/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  analysis-service:
    <<: *service-base
    container_name: advisor_analysis_prod
    command: uvicorn services.analysis_service.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/analysis/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  recommender-service:
    <<: *service-base
    container_name: advisor_recommender_prod
    command: uvicorn services.recommender_service.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/recommend/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  admin-service:
    <<: *service-base
    container_name: advisor_admin_prod
    command: uvicorn services.admin_service.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/admin/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Celery Workers
  worker-cv-parser:
    <<: *worker-base
    container_name: advisor_worker_cv_parser_prod
    command: celery -A worker.celery_app worker -Q cv_parsing -n cv_parser@%h --loglevel=info --concurrency=${WORKER_PARSING_CONCURRENCY:-2}
    volumes:
      - ./data/cv_uploads:/app/data/cv_uploads

  worker-analysis:
    <<: *worker-base
    container_name: advisor_worker_analysis_prod
    command: celery -A worker.celery_app worker -Q analysis -n analysis@%h --loglevel=info --concurrency=${WORKER_ANALYSIS_CONCURRENCY:-2}

  worker-crawler:
    <<: *worker-base
    container_name: advisor_worker_crawler_prod
    command: celery -A worker.celery_app worker -Q market_stats -n crawler@%h --loglevel=info --concurrency=${WORKER_CRAWLER_CONCURRENCY:-1}

  worker-default:
    <<: *worker-base
    container_name: advisor_worker_default_prod
    command: celery -A worker.celery_app worker -n default@%h --loglevel=info --concurrency=${WORKER_DEFAULT_CONCURRENCY:-1}
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  worker-email:
    <<: *worker-base
    container_name: advisor_worker_email_prod
    command: celery -A worker.celery_app worker -Q email -n email@%h --loglevel=info --concurrency=${WORKER_EMAIL_CONCURRENCY:-2}
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # Celery Beat Scheduler (for periodic tasks: auto-crawl, daily aggregations)
  celery-beat:
    <<: *worker-base
    container_name: advisor_celery_beat_prod
    command: celery -A worker.celery_app beat --loglevel=info
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

networks:
  advisor_net_prod:
    driver: bridge
