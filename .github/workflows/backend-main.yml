name: Main Branch CI/CD

on:
  workflow_dispatch:
    # push:
    #   branches: [main]
    # pull_request:
    #   branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ============================================================================
  # Job 1: Code Quality & Linting
  # ============================================================================
  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install flake8 black isort mypy
          pip install -r requirements.txt

      - name: Run Black (code formatting check)
        run: black --check --diff .
        continue-on-error: true

      - name: Run isort (import sorting check)
        run: isort --check-only --diff .
        continue-on-error: true

      - name: Run Flake8 (linting)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        continue-on-error: true

  # ============================================================================
  # Job 2: Run Tests
  # ============================================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: ankane/pgvector:v0.5.1
        env:
          POSTGRES_DB: career_advisor_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev libmagic1 poppler-utils

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run database migrations
        env:
          POSTGRES_HOST: localhost
          POSTGRES_DB: career_advisor_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          REDIS_HOST: localhost
        run: python scripts/run_migrations.py

      - name: Run pytest
        env:
          POSTGRES_HOST: localhost
          POSTGRES_DB: career_advisor_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          REDIS_HOST: localhost
          PYTHONPATH: .
        run: pytest tests/ -v --tb=short --maxfail=5

  # ============================================================================
  # Job 3: Build Docker Images
  # ============================================================================
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        image: [service, worker]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.image }}
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.${{ matrix.image }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # Job 4: Deploy to Production
  # ============================================================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://your-domain.com

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh $SERVER_USER@$SERVER_HOST << 'EOF'
            cd /opt/career-advisor/backend
            
            # Pull latest code
            git pull origin main
            
            # Pull latest Docker images
            docker compose -f docker-compose.prod.yml pull
            
            # Run migrations
            docker compose -f docker-compose.prod.yml run --rm gateway python scripts/run_migrations.py
            
            # Deploy with zero-downtime
            docker compose -f docker-compose.prod.yml up -d --no-deps --build
            
            # Wait for services to be healthy
            sleep 30
            
            # Verify deployment
            docker compose -f docker-compose.prod.yml ps
          EOF

      - name: Health Check
        run: |
          max_attempts=10
          attempt=0
          
          while [ $attempt -lt $max_attempts ]; do
            if curl -f https://your-domain.com/health; then
              echo "Health check passed!"
              exit 0
            fi
            
            attempt=$((attempt + 1))
            echo "Health check failed, attempt $attempt/$max_attempts"
            sleep 10
          done
          
          echo "Health check failed after $max_attempts attempts"
          exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            cd /opt/career-advisor/backend
            ./rollback.sh
          EOF

  # ============================================================================
  # Job 5: Verify AI Logging (per AGENTS.md requirements)
  # ============================================================================
  verify-ai-logging:
    name: Verify AI Logging Setup
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Check AI logging hooks
        run: |
          echo "Verifying AI logging configuration..."
          
          # Check if setup_hooks.sh exists
          if [ ! -f "scripts/setup_hooks.sh" ]; then
            echo "ERROR: scripts/setup_hooks.sh not found"
            exit 1
          fi
          
          # Check if .ai-log directory is gitignored
          if ! grep -q ".ai-log" .gitignore 2>/dev/null; then
            echo "WARNING: .ai-log should be in .gitignore"
          fi
          
          echo "AI logging verification passed"

  # ============================================================================
  # Job 6: Notify on completion
  # ============================================================================
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [deploy, verify-ai-logging]
    if: always()

    steps:
      - name: Send Slack notification
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            Deployment to production: ${{ job.status }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
