name: Frontend CI/CD

on:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: |
          cd frontend
          npm install
      - name: Build
        run: |
          cd frontend
          npm run build

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Frontend via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            echo "========================================="
            echo "🚀 Deploying Frontend..."
            echo "========================================="
            
            # Navigate to project directory
            cd ${{ secrets.PROJECT_DIR }}/frontend
            
            # Pull latest code
            echo "📥 Pulling latest code..."
            git pull origin ${{ github.ref_name }}
            
            # Build and deploy with docker-compose
            echo "🔨 Building and starting containers..."
            docker-compose -f docker-compose.prod.yml up -d --build
            
            # Wait for frontend to start
            echo "⏳ Waiting for frontend to start (20 seconds)..."
            sleep 20
            
            # Health check
            echo "🏥 Running health check..."
            curl -f http://localhost:3000 || (echo "❌ Frontend health check failed" && exit 1)
            
            # Verify container is running
            echo "🔍 Verifying container status..."
            docker-compose ps | grep "frontend" | grep -v "Exit" || (echo "❌ Frontend container is not running" && exit 1)
            
            echo "========================================="
            echo "✅ Frontend deployment complete!"
            echo "✅ Health check passed!"
            echo "========================================="
