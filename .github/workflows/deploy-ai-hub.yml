name: Deploy AI Inference Hub

on:
  push:
    branches: [demo]
    paths:
      - 'ai_inference_hub/**'

jobs:
  deploy:
    name: Deploy AI Hub to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_AI_HOST }}
          username: ${{ secrets.VPS_AI_USER }}
          key: ${{ secrets.VPS_AI_SSH_KEY }}
          port: ${{ secrets.VPS_AI_PORT || 22 }}
          script: |
            set -e
            echo "========================================="
            echo "🚀 Deploying AI Inference Hub..."
            echo "========================================="

            # Navigate to project directory
            cd ${{ secrets.VPS_AI_PROJECT_DIR }}/ai_inference_hub

            # Pull latest changes
            echo "📥 Pulling latest code..."
            git pull origin demo

            # Ensure Python 3.11 is used for the virtual environment
            echo "🔧 Checking Python 3.11 environment..."
            if ! command -v python3.11 &> /dev/null; then
              echo "❌ ERROR: python3.11 is not installed on the VPS."
              exit 1
            fi

            if [ ! -d "venv" ] || [[ $(venv/bin/python --version) != *"3.11"* ]]; then
              echo "⚙️ Creating new virtual environment with Python 3.11..."
              rm -rf venv
              python3.11 -m venv venv
            fi

            source venv/bin/activate

            # Install/update dependencies
            echo "📦 Installing dependencies..."
            ./venv/bin/python -m pip install -r requirements_ai.txt --quiet

            # Force reinstall accelerate to prevent PM2 detection issues
            echo "🧹 Forcing reinstall of accelerate..."
            ./venv/bin/python -m pip install --force-reinstall --no-cache-dir accelerate transformers --quiet

            # Verify accelerate
            echo "🔍 Verifying accelerate installation..."
            ./venv/bin/python -c "import accelerate; print('Accelerate version:', accelerate.__version__)"

            # Restart service via PM2 (using explicit venv path to ensure all dependencies are found)
            echo "🔄 Restarting AI Hub service..."
            pm2 delete ai-hub || true
            pm2 start "./venv/bin/uvicorn main:app --host 0.0.0.0 --port 8080" --name ai-hub

            # Health check
            echo "🏥 Running health check..."
            sleep 5
            curl -sf http://localhost:8080/health || echo "⚠️ Health check failed, service may still be starting..."

            echo "✅ AI Inference Hub deployed successfully!"
