<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="600" viewBox="0 0 1400 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bg_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#1E1B4B" />
    </linearGradient>
    <linearGradient id="flow_line_grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="50%" stop-color="#818CF8" />
      <stop offset="100%" stop-color="#C084FC" />
    </linearGradient>
    <linearGradient id="card_grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.04" />
    </linearGradient>
    
    <!-- Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="card_shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.4" />
    </filter>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1400" height="600" rx="32" fill="url(#bg_grad)"/>
  <rect width="1400" height="600" rx="32" fill="url(#grid)"/>

  <!-- Title -->
  <text x="700" y="60" text-anchor="middle" fill="white" style="font-family: Inter, system-ui, sans-serif; font-size: 32px; font-weight: 800;">The Journey to Success</text>
  <text x="700" y="90" text-anchor="middle" fill="#94A3B8" style="font-family: Inter, system-ui, sans-serif; font-size: 16px;">Leveller.ai personalized career growth pathway</text>

  <!-- Connecting Wave Path -->
  <path d="M100 300 Q250 150 400 300 T700 300 T1000 300 T1300 300" stroke="url(#flow_line_grad)" stroke-width="6" fill="none" stroke-linecap="round" stroke-dasharray="1 15" opacity="0.4"/>

  <!-- Step 1: CV Upload -->
  <g transform="translate(100, 250)">
    <rect x="-80" y="-120" width="160" height="200" rx="24" fill="#1E293B" fill-opacity="0.8" stroke="#FFFFFF" stroke-opacity="0.1" filter="url(#card_shadow)"/>
    <circle cx="0" cy="0" r="32" fill="#0EA5E9" filter="url(#glow)"/>
    <path d="M-10 -10 V10 H10 V-10 M0 10 V-5 M-5 -2 L0 -7 L5 -2" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="0" y="50" text-anchor="middle" fill="white" style="font-family: Inter, system-ui, sans-serif; font-size: 14px; font-weight: 700;">1. CV Upload</text>
    <text x="0" y="68" text-anchor="middle" fill="#94A3B8" style="font-family: Inter, system-ui, sans-serif; font-size: 11px;">PDF/Image Analysis</text>
  </g>

  <!-- Step 2: AI Parsing -->
  <g transform="translate(270, 350)">
    <rect x="-80" y="-120" width="160" height="200" rx="24" fill="#1E293B" fill-opacity="0.8" stroke="#FFFFFF" stroke-opacity="0.1" filter="url(#card_shadow)"/>
    <circle cx="0" cy="0" r="32" fill="#3B82F6" filter="url(#glow)"/>
    <path d="M-10 -5 H10 M-10 0 H5 M-10 5 H8" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <text x="0" y="50" text-anchor="middle" fill="white" style="font-family: Inter, system-ui, sans-serif; font-size: 14px; font-weight: 700;">2. AI Parsing</text>
    <text x="0" y="68" text-anchor="middle" fill="#94A3B8" style="font-family: Inter, system-ui, sans-serif; font-size: 11px;">Skill Extraction</text>
  </g>

  <!-- Step 3: JD Target -->
  <g transform="translate(440, 250)">
    <rect x="-80" y="-120" width="160" height="200" rx="24" fill="#1E293B" fill-opacity="0.8" stroke="#FFFFFF" stroke-opacity="0.1" filter="url(#card_shadow)"/>
    <circle cx="0" cy="0" r="32" fill="#6366F1" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="10" stroke="white" stroke-width="2" fill="none"/>
    <path d="M-12 0 H12 M0 -12 V12" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <text x="0" y="50" text-anchor="middle" fill="white" style="font-family: Inter, system-ui, sans-serif; font-size: 14px; font-weight: 700;">3. Target JD</text>
    <text x="0" y="68" text-anchor="middle" fill="#94A3B8" style="font-family: Inter, system-ui, sans-serif; font-size: 11px;">Goal Selection</text>
  </g>

  <!-- Step 4: Matching -->
  <g transform="translate(610, 350)">
    <rect x="-80" y="-120" width="160" height="200" rx="24" fill="#1E293B" fill-opacity="0.8" stroke="#FFFFFF" stroke-opacity="0.1" filter="url(#card_shadow)"/>
    <circle cx="0" cy="0" r="32" fill="#8B5CF6" filter="url(#glow)"/>
    <path d="M-8 4 L-2 10 L10 -4" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="0" y="50" text-anchor="middle" fill="white" style="font-family: Inter, system-ui, sans-serif; font-size: 14px; font-weight: 700;">4. Skill Matching</text>
    <text x="0" y="68" text-anchor="middle" fill="#94A3B8" style="font-family: Inter, system-ui, sans-serif; font-size: 11px;">AI Reasoning</text>
  </g>

  <!-- Step 5: Gap Analysis -->
  <g transform="translate(780, 250)">
    <rect x="-80" y="-120" width="160" height="200" rx="24" fill="#1E293B" fill-opacity="0.8" stroke="#FFFFFF" stroke-opacity="0.1" filter="url(#card_shadow)"/>
    <circle cx="0" cy="0" r="32" fill="#A855F7" filter="url(#glow)"/>
    <path d="M-10 8 L-2 -2 L10 10 M-2 -2 V8 M-2 -2 H5" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <text x="0" y="50" text-anchor="middle" fill="white" style="font-family: Inter, system-ui, sans-serif; font-size: 14px; font-weight: 700;">5. Gap Analysis</text>
    <text x="0" y="68" text-anchor="middle" fill="#94A3B8" style="font-family: Inter, system-ui, sans-serif; font-size: 11px;">Missing Skills</text>
  </g>

  <!-- Step 6: Discovery -->
  <g transform="translate(950, 350)">
    <rect x="-80" y="-120" width="160" height="200" rx="24" fill="#1E293B" fill-opacity="0.8" stroke="#FFFFFF" stroke-opacity="0.1" filter="url(#card_shadow)"/>
    <circle cx="0" cy="0" r="32" fill="#D946EF" filter="url(#glow)"/>
    <path d="M-10 -5 H10 V10 H-10 Z M-10 0 H10" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="0" y="50" text-anchor="middle" fill="white" style="font-family: Inter, system-ui, sans-serif; font-size: 14px; font-weight: 700;">6. Courses</text>
    <text x="0" y="68" text-anchor="middle" fill="#94A3B8" style="font-family: Inter, system-ui, sans-serif; font-size: 11px;">Vector Search</text>
  </g>

  <!-- Step 7: Analytics -->
  <g transform="translate(1120, 250)">
    <rect x="-80" y="-120" width="160" height="200" rx="24" fill="#1E293B" fill-opacity="0.8" stroke="#FFFFFF" stroke-opacity="0.1" filter="url(#card_shadow)"/>
    <circle cx="0" cy="0" r="32" fill="#EC4899" filter="url(#glow)"/>
    <path d="M-10 10 V-5 M0 10 V-10 M10 10 V0" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <text x="0" y="50" text-anchor="middle" fill="white" style="font-family: Inter, system-ui, sans-serif; font-size: 14px; font-weight: 700;">7. Analytics</text>
    <text x="0" y="68" text-anchor="middle" fill="#94A3B8" style="font-family: Inter, system-ui, sans-serif; font-size: 11px;">Market Demand</text>
  </g>

  <!-- Step 8: Presentation -->
  <g transform="translate(1290, 350)">
    <rect x="-80" y="-120" width="160" height="200" rx="24" fill="#1E293B" fill-opacity="0.8" stroke="#FFFFFF" stroke-opacity="0.1" filter="url(#card_shadow)"/>
    <circle cx="0" cy="0" r="32" fill="#F43F5E" filter="url(#glow)"/>
    <path d="M-8 8 L8 8 L0 -8 Z" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="0" y="50" text-anchor="middle" fill="white" style="font-family: Inter, system-ui, sans-serif; font-size: 14px; font-weight: 700;">8. Presentation</text>
    <text x="0" y="68" text-anchor="middle" fill="#94A3B8" style="font-family: Inter, system-ui, sans-serif; font-size: 11px;">Radar &amp; Roadmap</text>
  </g>

</svg>
