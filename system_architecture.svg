<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Definitions for Gradients, Shadows, and Markers -->
  <defs>
    <linearGradient id="grad_blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>
    <linearGradient id="grad_purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C084FC" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
    <linearGradient id="grad_green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ADE80" />
      <stop offset="100%" stop-color="#15803D" />
    </linearGradient>
    <linearGradient id="grad_orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FB923C" />
      <stop offset="100%" stop-color="#C2410C" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3" />
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748B" />
    </marker>
    <marker id="arrowhead_purple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7C3AED" />
    </marker>
    <marker id="arrowhead_lavender" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#C084FC" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" rx="20" fill="#0F172A"/>
  
  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="white" style="font-family: Inter, system-ui, sans-serif; font-size: 32px; font-weight: 700; letter-spacing: -0.025em;">Leveller.ai System Architecture</text>
  <text x="600" y="80" text-anchor="middle" fill="#94A3B8" style="font-family: Inter, system-ui, sans-serif; font-size: 16px;">Modern Microservices &amp; AI-Driven Career Roadmap Platform</text>
  
  <!-- Connecting Lines for Data Flow (Drawn first to be behind boxes) -->
  <g stroke-width="1.5" stroke-dasharray="2 2">
    <!-- Microservices to Workers -->
    <path d="M450 600 H462" stroke="#7C3AED" marker-end="url(#arrowhead_purple)"/>
    <!-- Workers to AI Hub -->
    <path d="M730 600 H742" stroke="#C084FC" marker-end="url(#arrowhead_lavender)"/>
    <!-- Group to Database -->
    <path d="M250 730 V750" stroke="#4ADE80" />
    <path d="M600 670 V750" stroke="#4ADE80" />
    <path d="M900 670 V750" stroke="#4ADE80" />
    <!-- Workers to External (Crawling) -->
    <path d="M700 670 V720 H1060 V750" stroke="#94A3B8" stroke-dasharray="4 4" marker-end="url(#arrowhead)"/>
  </g>

  <!-- User Section -->
  <g transform="translate(540, 120)" filter="url(#shadow)">
    <rect width="120" height="60" rx="12" fill="#1E293B" stroke="#334155" stroke-width="2"/>
    <text x="60" y="38" text-anchor="middle" fill="white" style="font-family: Inter, system-ui, sans-serif; font-size: 16px; font-weight: 600;">USER</text>
  </g>

  <!-- Arrows from User -->
  <path d="M600 180 V210" stroke="#64748B" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Frontend Section -->
  <g transform="translate(450, 220)" filter="url(#shadow)">
    <rect width="300" height="80" rx="16" fill="url(#grad_blue)" />
    <text x="150" y="45" text-anchor="middle" fill="white" style="font-family: Inter, system-ui, sans-serif; font-size: 18px; font-weight: 700;">Frontend App</text>
    <text x="150" y="65" text-anchor="middle" fill="white" fill-opacity="0.8" style="font-family: Inter, system-ui, sans-serif; font-size: 12px;">Next.js 14 • TailwindCSS • TypeScript</text>
  </g>

  <!-- Gateway Section -->
  <g transform="translate(450, 340)" filter="url(#shadow)">
    <rect width="300" height="80" rx="16" fill="#1E293B" stroke="#38BDF8" stroke-width="2" stroke-dasharray="4 4"/>
    <text x="150" y="45" text-anchor="middle" fill="#38BDF8" style="font-family: Inter, system-ui, sans-serif; font-size: 18px; font-weight: 700;">API Gateway</text>
    <text x="150" y="65" text-anchor="middle" fill="#94A3B8" style="font-family: Inter, system-ui, sans-serif; font-size: 12px;">FastAPI • Uvicorn • JWT Auth</text>
  </g>

  <!-- Connections from Gateway -->
  <path d="M450 380 H150 V450" stroke="#334155" stroke-width="2" fill="none"/>
  <path d="M750 380 H1050 V450" stroke="#334155" stroke-width="2" fill="none"/>
  <path d="M600 420 V500" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="2 2" marker-end="url(#arrowhead_purple)"/>
  <text x="610" y="445" fill="#C084FC" style="font-family: Inter, system-ui, sans-serif; font-size: 10px;">Async Tasks</text>

  <!-- Core Microservices Group -->
  <rect x="50" y="450" width="400" height="280" rx="20" fill="#111827" stroke="#1E293B" stroke-width="1"/>
  <text x="70" y="480" fill="#94A3B8" style="font-family: Inter, system-ui, sans-serif; font-size: 14px; font-weight: 600; text-transform: uppercase;">Core Microservices</text>
  
  <g transform="translate(70, 500)">
    <rect width="170" height="60" rx="10" fill="#1E293B" stroke="#334155"/>
    <text x="85" y="35" text-anchor="middle" fill="white" style="font-family: Inter, system-ui, sans-serif; font-size: 14px;">Auth Service</text>
  </g>
  <g transform="translate(260, 500)">
    <rect width="170" height="60" rx="10" fill="#1E293B" stroke="#334155"/>
    <text x="85" y="35" text-anchor="middle" fill="white" style="font-family: Inter, system-ui, sans-serif; font-size: 14px;">CV Service</text>
  </g>
  <g transform="translate(70, 580)">
    <rect width="170" height="60" rx="10" fill="#1E293B" stroke="#334155"/>
    <text x="85" y="35" text-anchor="middle" fill="white" style="font-family: Inter, system-ui, sans-serif; font-size: 14px;">JD Service</text>
  </g>
  <g transform="translate(260, 580)">
    <rect width="170" height="60" rx="10" fill="#1E293B" stroke="#334155"/>
    <text x="85" y="35" text-anchor="middle" fill="white" style="font-family: Inter, system-ui, sans-serif; font-size: 14px;">Analysis Service</text>
  </g>
  <g transform="translate(70, 660)">
    <rect width="170" height="60" rx="10" fill="#1E293B" stroke="#334155"/>
    <text x="85" y="35" text-anchor="middle" fill="white" style="font-family: Inter, system-ui, sans-serif; font-size: 14px;">Recommender Service</text>
  </g>
  <g transform="translate(260, 660)">
    <rect width="170" height="60" rx="10" fill="#1E293B" stroke="#334155"/>
    <text x="85" y="35" text-anchor="middle" fill="white" style="font-family: Inter, system-ui, sans-serif; font-size: 14px;">Admin Service</text>
  </g>

  <!-- Worker Infrastructure Group -->
  <rect x="470" y="450" width="260" height="220" rx="20" fill="#111827" stroke="#1E293B" stroke-width="1"/>
  <text x="490" y="480" fill="#94A3B8" style="font-family: Inter, system-ui, sans-serif; font-size: 14px; font-weight: 600; text-transform: uppercase;">Async Workers</text>
  
  <g transform="translate(500, 500)" filter="url(#shadow)">
    <rect width="200" height="40" rx="8" fill="#7C3AED"/>
    <text x="100" y="25" text-anchor="middle" fill="white" style="font-family: Inter, system-ui, sans-serif; font-size: 14px; font-weight: 600;">Redis Broker</text>
  </g>
  
  <g transform="translate(500, 555)">
    <rect width="200" height="100" rx="12" fill="#1E293B" stroke="#7C3AED" stroke-width="1"/>
    <text x="100" y="30" text-anchor="middle" fill="white" style="font-family: Inter, system-ui, sans-serif; font-size: 13px; font-weight: 600;">Celery Workers</text>
    <text x="100" y="55" text-anchor="middle" fill="#94A3B8" style="font-family: Inter, system-ui, sans-serif; font-size: 11px;">• Analysis Worker</text>
    <text x="100" y="75" text-anchor="middle" fill="#94A3B8" style="font-family: Inter, system-ui, sans-serif; font-size: 11px;">• Parsing Worker</text>
    <text x="100" y="95" text-anchor="middle" fill="#94A3B8" style="font-family: Inter, system-ui, sans-serif; font-size: 11px;">• Crawler Worker</text>
  </g>

  <!-- AI Inference Hub Group -->
  <rect x="750" y="450" width="400" height="220" rx="20" fill="#111827" stroke="#1E293B" stroke-width="1"/>
  <text x="770" y="480" fill="#94A3B8" style="font-family: Inter, system-ui, sans-serif; font-size: 14px; font-weight: 600; text-transform: uppercase;">AI &amp; Inference Hub</text>

  <g transform="translate(770, 500)" filter="url(#shadow)">
    <rect width="170" height="60" rx="10" fill="url(#grad_purple)" />
    <text x="85" y="35" text-anchor="middle" fill="white" style="font-family: Inter, system-ui, sans-serif; font-size: 14px; font-weight: 700;">LiteLLM Router</text>
    <text x="85" y="52" text-anchor="middle" fill="white" fill-opacity="0.8" style="font-family: Inter, system-ui, sans-serif; font-size: 10px;">GPT-4o, Gemini, Claude</text>
  </g>
  
  <g transform="translate(960, 500)" filter="url(#shadow)">
    <rect width="170" height="60" rx="10" fill="url(#grad_orange)" />
    <text x="85" y="35" text-anchor="middle" fill="white" style="font-family: Inter, system-ui, sans-serif; font-size: 14px; font-weight: 700;">Chandra OCR</text>
    <text x="85" y="52" text-anchor="middle" fill="white" fill-opacity="0.8" style="font-family: Inter, system-ui, sans-serif; font-size: 10px;">Multimodal Engine</text>
  </g>

  <g transform="translate(770, 580)">
    <rect width="360" height="60" rx="10" fill="#1E293B" stroke="#C084FC" stroke-dasharray="2 2"/>
    <text x="180" y="35" text-anchor="middle" fill="#C084FC" style="font-family: Inter, system-ui, sans-serif; font-size: 14px; font-weight: 600;">LangGraph Orchestrator</text>
    <text x="180" y="52" text-anchor="middle" fill="#94A3B8" style="font-family: Inter, system-ui, sans-serif; font-size: 11px;">Agentic Workflows for Analysis &amp; Parsing</text>
  </g>

  <!-- Data Layer -->
  <g transform="translate(50, 750)" filter="url(#shadow)">
    <rect width="900" height="100" rx="20" fill="#1E293B" stroke="#4ADE80" stroke-width="2"/>
    <text x="450" y="35" text-anchor="middle" fill="#4ADE80" style="font-family: Inter, system-ui, sans-serif; font-size: 16px; font-weight: 700; text-transform: uppercase;">Data Layer</text>
    
    <g transform="translate(180, 50)">
      <rect width="240" height="35" rx="8" fill="#111827" stroke="#334155"/>
      <text x="120" y="22" text-anchor="middle" fill="white" style="font-family: Inter, system-ui, sans-serif; font-size: 13px;">PostgreSQL + pgvector</text>
    </g>
    
    <g transform="translate(480, 50)">
      <rect width="240" height="35" rx="8" fill="#111827" stroke="#334155"/>
      <text x="120" y="22" text-anchor="middle" fill="white" style="font-family: Inter, system-ui, sans-serif; font-size: 13px;">Redis Cache / Persistence</text>
    </g>
  </g>

  <!-- External Services -->
  <g transform="translate(970, 750)">
    <text x="90" y="0" text-anchor="middle" fill="#94A3B8" style="font-family: Inter, system-ui, sans-serif; font-size: 12px; font-weight: 600; text-transform: uppercase;">External</text>
    <rect width="180" height="100" rx="16" fill="#111827" stroke="#334155" />
    <text x="90" y="45" text-anchor="middle" fill="#94A3B8" style="font-family: Inter, system-ui, sans-serif; font-size: 13px;">• TopCV (Jobs)</text>
    <text x="90" y="70" text-anchor="middle" fill="#94A3B8" style="font-family: Inter, system-ui, sans-serif; font-size: 13px;">• Coursera (Courses)</text>
  </g>


</svg>
